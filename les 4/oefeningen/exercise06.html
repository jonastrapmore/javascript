<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oefening 6</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
  <main class="container">
    <div class="row">
      <div class="col">
        <h1>Oefening 6</h1>
      </div>
    </div>
    <div class="row gap-4">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header">
            Product
          </div>
          <div class="card-body">
            <form>
              <div class="mb-3 d-flex flex-row gap-4">
                <input type="text" class="form-control" placeholder="Omschrijving" id="product">
                <input type="number" class="form-control" placeholder="Aantal" id="aantal">
                <input type="number" class="form-control" placeholder="Prijs" id="prijs">
              </div>
              <button type="button" class="btn btn-success" id="add-btn">Toevoegen</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md">
        <div class="card">
          <div class="card-header">
            Winkelkar
          </div>
          <div class="card-body">
            <ul id="list">
              <li>Geen producten gevonden</li>
            </ul>
          </div>
          <div class="card-footer d-flex justify-content-between">
            <strong>Totaal</strong>
            <span id="Totaal">0.00</span>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

  <script>
    const productInput = document.querySelector('#product')
    const aantalInput = document.querySelector('#aantal')
    const prijsInput = document.querySelector('#prijs')
    const list = document.querySelector('#list')
    const totaalDisplay = document.querySelector('#totaal')
    const shoppingcart = []

    document.querySelector('#add-btn').addEventListener('click', GegevensInlezen)

    function GegevensInlezen() {
      const product = productInput.value
      const aantal = Number(aantalInput.value)
      const prijs = Number(prijsInput.value)

      if (product) {
        shoppingcart.push({product,aantal,prijs})
        productInput.value =''
        aantalInput.value = ''
        prijsInput.value = ''

        UpdateShoppingCart()
      }
    }

    function UpdateShoppingCart() {
      list.innerHTML = ''

      if (shoppingcart.length === 0) {
        list.appendChild(CreateListItem('Geen producten gevonden'))
      } else {
        shoppingcart.forEach(({product, aantal, prijs}) => {
          list.appendChild(CreateListItem(`${product} (${aantal} x €${prijs.toFixed(2)}) = €${(aantal * prijs).toFixed(2)} euro`))
        })
        const totaal = shoppingcart.reduce((acc, {aantal, prijs})=> acc + aantal * prijs,0)
        totaalDisplay.textContent = `€${totaal.toFixed(2)}`
      }
    }

    function CreateListItem(item) {
      const listItem = document.createElement('li')
      listItem.textContent = item

      return listItem
    }
  </script>
</body>

</html>
