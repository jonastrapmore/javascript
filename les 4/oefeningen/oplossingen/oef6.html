<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oefening 6</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<main class="container">
  <div class="row">
    <div class="col">
      <h1>Oefening 6</h1>
    </div>
  </div>
  <div class="alert alert-danger d-none" role="alert" id="discount-error">
    De opgegeven kortingscode is niet geldig.
  </div>
  <div class="row gap-4">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header">
          Product
        </div>
        <div class="card-body">
          <form>
            <div class="mb-3 d-flex flex-row gap-4">
              <input type="text" class="form-control" id="product" placeholder="Omschrijving">
              <input type="number" class="form-control" id="amount" placeholder="Aantal">
              <input type="number" class="form-control" id="price" placeholder="Prijs">
            </div>
            <button type="button" class="btn btn-success" id="add-button">Toevoegen</button>
          </form>
        </div>
      </div>
    </div>
    <div class="col-md">
      <div class="card">
        <div class="card-header">
          Winkelkar
        </div>
        <div class="card-body">
          <ul id="cart">
            <li>Geen producten gevonden</li>
          </ul>
        </div>
        <div class="card-footer d-flex justify-content-between p-0">
          <input type="text" class="form-control rounded-0" id="discount" placeholder="Korting">
        </div>
        <div class="card-footer d-flex justify-content-between">
          <strong>Totaal <span id="discount-indicator"></span></strong>
          <span id="total">€0.00</span>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<script>
  const productInput = document.getElementById('product')
  const addButton = document.getElementById('add-button')
  const cartDisplay = document.getElementById('cart')
  const amountInput = document.getElementById('amount')
  const priceInput = document.getElementById('price')
  const totalDisplay = document.getElementById('total')
  const discountInput = document.getElementById('discount')
  const discountIndicator = document.getElementById('discount-indicator')
  const shoppingCart = []

  addButton.addEventListener('click', function() {
    const product = productInput.value
    const amount = Number(amountInput.value)
    const price = Number(priceInput.value)

    if (product) {
      shoppingCart.push({product, amount, price})
      renderShoppingCart()
      productInput.value = ''
      amountInput.value = ''
      priceInput.value = ''
    }
  })

  discountInput.addEventListener('input', function() {
    const code = discountInput.value
    const [_, _discount] = code.split('OFF')
    const discount = Number(_discount)
    const total = shoppingCart.reduce((acc, {amount, price}) => acc + amount * price, 0)

    if (_discount === '' || discount > 60 || isNaN(discount)) {
      document.getElementById('discount-error').classList.remove('d-none')
      discountIndicator.textContent = ''
      totalDisplay.innerHTML = `€${total.toFixed(2)}`
    } else {
      document.getElementById('discount-error').classList.add('d-none')
      discountIndicator.textContent = ` (met ${discount}% korting)`
      totalDisplay.innerHTML = `€${(total * (1 - discount / 100)).toFixed(2)}`
    }
  })

  function renderShoppingCart() {
    cartDisplay.innerHTML = ''

    if (shoppingCart.length === 0) {
      cartDisplay.appendChild(createListItem('Geen producten gevonden'))
    } else {
      shoppingCart.forEach(({product, amount, price}) => {
        cartDisplay.appendChild(createListItem(`${product} (${amount} x €${price.toFixed(2)}) = €${(amount * price).toFixed(2)} euro`))
      })
      const total = shoppingCart.reduce((acc, {amount, price}) => acc + amount * price, 0)
      totalDisplay.textContent = `€${total.toFixed(2)}`

    }
  }

  function createListItem(text) {
    const listItem = document.createElement('li')
    listItem.textContent = text

    return listItem
  }
</script>
</body>
</html>
