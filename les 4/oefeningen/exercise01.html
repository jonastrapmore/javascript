<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oefening 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<main class="container">
  <div class="row">
    <div class="col">
      <h1>Oefening 1</h1>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          Groenten en fruit
        </div>
        <div class="card-body">
          <div id="fruit"></div>
          <div id="groenten"></div>
          <div id="resultaat"></div>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<script>
  const fruit = ['Appel', 'Peer', 'Banaan']
  const groenten = ['Bloemkool', 'Courgette', 'Wuttel']

  document.querySelector('#fruit').innerHTML = "<strong>Fruit: </strong> " + fruit.join(', ')
  document.querySelector('#groenten').innerHTML = "<strong>Groenten: </strong> " + groenten.join(', ')
  document.querySelector('#resultaat').innerHTML = "<strong>Groenten en fruit: </strong> " + groenten.concat(fruit).join(', ')


</script>
</body>
</html>
