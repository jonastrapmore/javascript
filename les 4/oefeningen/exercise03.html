<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oefening 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <main class="container">
        <div class="row">
            <div class="col">
                <h1>Oefening 2</h1>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        Random foto
                    </div>
                    <div class="card-body text-center">
                        <img src="img/1.webp" id="foto" class="img-fluid">
                        <br>
                        <button class="btn btn-primary mt-2" id="random-button">Random foto</button>
                        <br>
                        <div id="resultaat"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        const foto = document.querySelector('#foto')
        const resultaat = document.querySelector('#resultaat')
        const images = ['desert.webp', 'mountain_forest.webp', 'snow.webp', 'space.webp']
        let previousImageIndex = 1

        function chooseRandomImage() {
            let newImageIndex = getRandomInteger(0, images.length - 1)
            while (newImageIndex == previousImageIndex) {
                newImageIndex = getRandomInteger(0, images.length - 1)
            }

            const imageNameWithoutExtension = images[newImageIndex].split('.')[0]
            resultaat.innerHTML += `<p>${imageNameWithoutExtension}</p>`
            
            foto.src = `img/${images[newImageIndex]}`
            previousImageIndex = newImageIndex
        }

        function getRandomInteger(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min
        }
        document.querySelector('#random-button').addEventListener('click', chooseRandomImage)
    </script>
</body>

</html>
