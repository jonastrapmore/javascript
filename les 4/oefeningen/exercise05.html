<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oefening 5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<main class="container">
  <div class="row">
    <div class="col">
      <h1>Oefening 5</h1>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <div class="card">
        <div class="card-header">
          Gloeilamp
        </div>
        <div class="card-body text-center">
          <button id="button">Doe het licht aan</button>
          <img id="afbeelding" src="img/pic_bulboff.gif">
          <!--<button>Doe het licht uit</button>!-->
        </div>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<script>
  const foto = document.querySelector('#afbeelding')
  let aan = false
  document.querySelector('#button').addEventListener('click', ToogleLight)

  function ToogleLight(){
    aan = !aan
    foto.src = aan ? 'img/pic_bulbon.gif' : 'img/pic_bulboff.gif'
    document.querySelector('#button').textContent = aan ? 'Doe het licht uit':'Doe het licht aan'
  }
</script>
</body>
</html>
